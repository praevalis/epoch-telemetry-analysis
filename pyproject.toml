[project]
name = "epoch-telemetry-analysis"
version = "0.1.0"
description = "An event-driven telemetry analysis engine powered by Redis Streams, ONNX edge inference, and TimescaleDB."
readme = "README.md"
requires-python = ">=3.13"
authors = [{ name = "Akshat Mishra", email = "akshatdmishra2005@gmail.com" }]

[tool.uv.workspace]
members = [
    "src/api",
    "src/engine",
    "src/worker"
]

[dependency-groups]
dev = [
    "mypy>=2.1.0",
    "pre-commit>=4.6.0",
    "pytest>=9.1.1",
    "pytest-asyncio>=1.4.0",
    "pytest-cov>=7.1.0",
    "ruff>=0.15.18",
    "testcontainers>=4.14.2",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
filterwarnings = [
    "ignore::DeprecationWarning:passlib.*",
]

[tool.poe.tasks]
start-dev = "uvicorn src.api.main:app --reload"
start = "uvicorn src.api.main:app --host 0.0.0.0 --port 8000"

lint = "ruff check . --fix"
format = "ruff format ."
fix = ["lint", "format"]

test = "pytest"
test-cov = "pytest --cov=src/api --cov=src/engine --cov=src/worker"
type-check = "mypy src/api src/engine src/worker"
audit = "uv audit"

[tool.poe.tasks.db-upgrade]
cmd = "alembic upgrade head"
help = "Apply all pending migrations to the database."

[tool.poe.tasks.db-downgrade]
cmd = "alembic downgrade -1"
help = "Revert the last migration."

[tool.poe.tasks.db-migrate]
cmd = "alembic revision --autogenerate -m \"${message}\""
help = "Create a new autogenerated migration file."
args = [
    {name = "message", options = ["-m", "--message"], help = "The migration message"},
]

[tool.mypy]
check_untyped_defs = true
namespace_packages = true
pretty = true
show_error_context = true
exclude = ".venv"

[[tool.mypy.overrides]]
module = "tests.*"
ignore_errors = true

[tool.ruff]
line-length = 100
target-version = "py313"
exclude = ["alembic/versions/"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "RUF"]
ignore = ["E501", "RUF001", "RUF002", "RUF003"]

[tool.ruff.lint.isort]
known-first-party = ["api", "engine", "worker", "tests"]

[tool.ruff.format]
quote-style = "single"
