services:
  timescaledb:
    image: timescale/timescaledb:latest-pg17
    container_name: epoch-timescaledb
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=epoch_db
    ports:
      - "5433:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.8-alpine
    container_name: epoch-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    # Force Redis to save to disk every 60 seconds if at least 1 key changed.
    # This guarantees stream persistence during local development restarts.
    command: redis-server --requirepass redis --save 60 1 --loglevel warning
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  timescaledb_data:
  redis_data:
